<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategies · Mint dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: auto;
    }

    .gradient-bg {
      background: #f5f6fa;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 75px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
      border-right: 1px solid #e8defa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      z-index: 1000;
    }

    .sidebar-logo {
      width: 45px;
      height: 45px;
      background: transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      padding: 0 15px;
    }

    .nav-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }

    .nav-icon svg {
      width: 22px;
      height: 22px;
      fill: #9ca3af;
      transition: fill 0.3s ease;
    }

    .nav-icon:hover svg,
    .nav-icon.active svg {
      fill: #374151;
    }

    .main-content {
      margin-left: 75px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e8defa;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-search {
      flex: 1;
      max-width: 520px;
      position: relative;
    }

    .top-search input {
      width: 100%;
      height: 42px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 0 14px;
      font-size: 0.9rem;
      color: #111827;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .top-search input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
      background: #ffffff;
    }

    .signout-btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #374151;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .signout-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .strategy-scroll-list {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .strategy-scroll-list::-webkit-scrollbar {
      width: 8px;
    }

    .strategy-scroll-list::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/icon.png" alt="App logo" style="width: 32px; height: 32px;" />
    </div>

    <nav class="sidebar-nav">
      <a class="nav-icon" href="/dashboard.html" aria-label="Dashboard">
        <svg viewBox="0 0 24 24">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
      </a>

      <a class="nav-icon" href="/index.html" aria-label="Profiles">
        <svg viewBox="0 0 24 24">
          <path d="M12 12c1.66 0 3-1.34 3-3S13.66 6 12 6 9 7.34 9 9s1.34 3 3 3zm0 2c-2.22 0-6 1.11-6 3.33V19h12v-1.67C18 15.11 14.22 14 12 14z"/>
        </svg>
      </a>

      <a class="nav-icon active" href="/strategies.html" aria-label="Strategies">
        <svg viewBox="0 0 24 24">
          <path d="M4 19h4v-4H4v4zm0-6h4V5H4v8zm6 6h4v-7h-4v7zm0-9h4V5h-4v5zm6 6h4v-10h-4v10zm0-12h4V5h-4v2z"/>
        </svg>
      </a>

      <a class="nav-icon" href="/orderbook.html" aria-label="Orderbook">
        <svg viewBox="0 0 24 24">
          <path d="M4 5h16v2H4V5zm0 6h16v2H4v-2zm0 6h10v2H4v-2z"/>
        </svg>
      </a>

      <a class="nav-icon" href="#" aria-label="Settings">
        <svg viewBox="0 0 24 24">
          <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.62l-1.92-3.32c-.11-.2-.36-.28-.58-.2l-2.39.96c-.5-.38-1.05-.7-1.66-.94l-.36-2.54A.488.488 0 0 0 14.9 2h-3.8c-.24 0-.44.17-.48.4l-.36 2.54c-.61.24-1.16.56-1.66.94l-2.39-.96a.5.5 0 0 0-.58.2L3.7 8.44c-.11.21-.06.48.12.62l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.62l1.92 3.32c.11.2.36.28.58.2l2.39-.96c.5.38 1.05.7 1.66.94l.36 2.54c.04.23.24.4.48.4h3.8c.24 0 .44-.17.48-.4l.36-2.54c.61-.24 1.16-.56 1.66-.94l2.39.96c.22.08.47 0 .58-.2l1.92-3.32a.5.5 0 0 0-.12-.62l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5S10.07 8.5 12 8.5s3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="top-nav">
      <div class="top-search">
        <input id="strategySearch" type="search" placeholder="Search strategies..." aria-label="Search strategies">
      </div>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>

    <div class="max-w-7xl mx-auto px-5 py-5 space-y-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Strategies</h1>
          <p class="text-sm text-slate-500 mt-1">Manage strategies, filter and see top performers.</p>
        </div>
        <div class="flex items-center gap-3 text-xs text-slate-500">
          <span id="strategiesTotalBadge" class="px-3 py-1 rounded-full bg-slate-100 text-slate-700">0 total</span>
          <span id="strategiesPublicBadge" class="px-3 py-1 rounded-full bg-emerald-50 text-emerald-700">0 public</span>
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-12 gap-5">
        <!-- Left column: add form -->
        <section class="xl:col-span-5 space-y-4">
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h2 class="text-lg font-semibold text-slate-900">Add new strategy</h2>
                <p class="text-xs text-slate-500 mt-1">Capture the basics for a new strategy on the platform.</p>
              </div>
            </div>

            <form id="strategyForm" class="space-y-3">
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyName">Strategy name</label>
                  <input id="strategyName" name="name" type="text" required
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500"
                    placeholder="Global Growth Fund" />
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyShortName">Short name</label>
                  <input id="strategyShortName" name="short_name" type="text"
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500"
                    placeholder="GGF" />
                </div>
              </div>

              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyDescription">Description / objective</label>
                <textarea id="strategyDescription" name="description" rows="3"
                  class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 resize-none"
                  placeholder="Briefly describe what this strategy aims to achieve."></textarea>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyRisk">Risk level</label>
                  <select id="strategyRisk" name="risk_level"
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500">
                    <option value="">Unspecified</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategySector">Sector</label>
                  <input id="strategySector" name="sector" type="text"
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500"
                    placeholder="Multi-asset, Equity, Income…" />
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyMinInvestment">Minimum investment</label>
                  <input id="strategyMinInvestment" name="min_investment" type="number" min="0" step="1"
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500"
                    placeholder="e.g. 50000" />
                </div>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1" for="strategyCurrency">Base currency</label>
                  <input id="strategyCurrency" name="base_currency" type="text"
                    class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500"
                    placeholder="ZAR" />
                </div>
                <div class="flex items-center gap-2 mt-5 sm:mt-6">
                  <input id="strategyIsPublic" name="is_public" type="checkbox"
                    class="rounded border-slate-300 text-violet-600 focus:ring-violet-500" />
                  <label for="strategyIsPublic" class="text-xs text-slate-700">Public strategy</label>
                </div>
                <div class="flex items-center gap-2 mt-2 sm:mt-6">
                  <input id="strategyIsFeatured" name="is_featured" type="checkbox"
                    class="rounded border-slate-300 text-violet-600 focus:ring-violet-500" />
                  <label for="strategyIsFeatured" class="text-xs text-slate-700">Featured</label>
                </div>
              </div>

              <div class="flex items-center justify-between pt-2">
                <p id="strategyFormMessage" class="text-xs text-slate-500"></p>
                <button type="submit"
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-violet-600 text-white text-sm font-semibold shadow-sm hover:bg-violet-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-1">
                  <span>Save strategy</span>
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- Right column: list + filters + top 5 -->
        <section class="xl:col-span-7 space-y-4">
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
              <div>
                <h2 class="text-lg font-semibold text-slate-900">All strategies</h2>
                <p class="text-xs text-slate-500 mt-1">Use filters and sort options to quickly find a strategy.</p>
              </div>
              <div class="flex flex-wrap items-center gap-2 text-xs">
                <select id="filterRisk"
                  class="border border-slate-300 rounded-full px-3 py-1 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500">
                  <option value="">All risks</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
                <select id="filterVisibility"
                  class="border border-slate-300 rounded-full px-3 py-1 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500">
                  <option value="">All visibility</option>
                  <option value="public">Public only</option>
                  <option value="featured">Featured only</option>
                </select>
                <select id="sortBy"
                  class="border border-slate-300 rounded-full px-3 py-1 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500">
                  <option value="recent">Newest first</option>
                  <option value="name">Name A–Z</option>
                  <option value="min_investment_desc">Min investment high → low</option>
                  <option value="min_investment_asc">Min investment low → high</option>
                </select>
              </div>
            </div>

            <div id="strategiesList" class="strategy-scroll-list space-y-3 text-sm text-slate-600">
            </div>
          </div>

          <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold text-slate-900">Top 5 performing strategies</h2>
              <span id="top5Badge" class="text-xs text-slate-500">0 strategies</span>
            </div>
            <div id="topStrategiesList" class="space-y-3 text-sm text-slate-600"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const strategySearch = document.getElementById('strategySearch');
    const signOutBtn = document.getElementById('signOutBtn');
    const strategyForm = document.getElementById('strategyForm');
    const strategyFormMessage = document.getElementById('strategyFormMessage');
    const strategiesList = document.getElementById('strategiesList');
    const topStrategiesList = document.getElementById('topStrategiesList');
    const strategiesTotalBadge = document.getElementById('strategiesTotalBadge');
    const strategiesPublicBadge = document.getElementById('strategiesPublicBadge');
    const top5Badge = document.getElementById('top5Badge');

    const filterRisk = document.getElementById('filterRisk');
    const filterVisibility = document.getElementById('filterVisibility');
    const sortBy = document.getElementById('sortBy');

    let allStrategies = [];

    const riskBadgeClass = (risk) => {
      switch ((risk || '').toLowerCase()) {
        case 'low':
          return 'bg-emerald-100 text-emerald-700';
        case 'medium':
          return 'bg-amber-100 text-amber-700';
        case 'high':
          return 'bg-rose-100 text-rose-700';
        default:
          return 'bg-slate-100 text-slate-600';
      }
    };

    const createStrategySlug = (value) => {
      const base = String(value || '')
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 48);
      const fallback = base || 'strategy';
      const unique = Date.now().toString(36).slice(-6);
      return `${fallback}-${unique}`;
    };

    const formatCurrency = (value, currency = 'ZAR') => {
      if (value === null || value === undefined) return 'No minimum';
      const numeric = Number(value);
      if (Number.isNaN(numeric) || numeric === 0) return 'No minimum';
      try {
        return new Intl.NumberFormat('en-ZA', {
          style: 'currency',
          currency,
          maximumFractionDigits: 0
        }).format(numeric);
      } catch {
        return `${numeric.toLocaleString()} ${currency}`;
      }
    };

    const renderStrategyCard = (strategy) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'border border-slate-200 rounded-2xl p-3 flex items-start justify-between gap-3';

      const name = strategy.short_name || strategy.name || 'Untitled strategy';
      const description = strategy.description || strategy.objective || 'No description provided.';
      const sector = strategy.sector || 'Unspecified sector';
      const risk = (strategy.risk_level || 'unspecified').toLowerCase();
      const currency = strategy.base_currency || 'ZAR';
      const minInvestment = formatCurrency(strategy.min_investment, currency);

      wrapper.innerHTML = `
        <div class="min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <p class="font-medium text-slate-900 truncate">${name}</p>
            ${strategy.is_featured ? '<span class="px-2 py-0.5 text-[10px] rounded-full bg-amber-100 text-amber-700 font-semibold">Featured</span>' : ''}
            ${strategy.is_public ? '<span class="px-2 py-0.5 text-[10px] rounded-full bg-emerald-100 text-emerald-700 font-semibold">Public</span>' : ''}
          </div>
          <p class="text-xs text-slate-500 mb-1 line-clamp-2">${description}</p>
          <p class="text-[11px] text-slate-400">Sector: ${sector}</p>
        </div>
        <div class="flex flex-col items-end gap-1">
          <span class="px-2 py-0.5 text-[11px] rounded-full ${riskBadgeClass(risk)}">${risk}</span>
          <span class="text-xs text-slate-500">${minInvestment}</span>
        </div>
      `;

      return wrapper;
    };

    const applyFiltersAndRender = () => {
      let items = [...allStrategies];

      const searchText = (strategySearch?.value || '').trim().toLowerCase();
      if (searchText) {
        items = items.filter((item) => {
          const text = [
            item.name,
            item.short_name,
            item.description,
            item.objective,
            item.sector
          ].filter(Boolean).join(' ').toLowerCase();
          return text.includes(searchText);
        });
      }

      const riskValue = filterRisk?.value || '';
      if (riskValue) {
        items = items.filter((item) => (item.risk_level || '').toLowerCase() === riskValue);
      }

      const visValue = filterVisibility?.value || '';
      if (visValue === 'public') {
        items = items.filter((item) => item.is_public);
      } else if (visValue === 'featured') {
        items = items.filter((item) => item.is_featured);
      }

      const sortValue = sortBy?.value || 'recent';
      if (sortValue === 'name') {
        items.sort((a, b) => (a.short_name || a.name || '').localeCompare(b.short_name || b.name || ''));
      } else if (sortValue === 'min_investment_desc') {
        items.sort((a, b) => (Number(b.min_investment) || 0) - (Number(a.min_investment) || 0));
      } else if (sortValue === 'min_investment_asc') {
        items.sort((a, b) => (Number(a.min_investment) || 0) - (Number(b.min_investment) || 0));
      } else {
        items.sort((a, b) => {
          const aCreated = a.created_at ? new Date(a.created_at).getTime() : 0;
          const bCreated = b.created_at ? new Date(b.created_at).getTime() : 0;
          return bCreated - aCreated;
        });
      }

      strategiesList.innerHTML = '';
      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'text-sm text-slate-500';
        empty.textContent = 'No strategies match your filters.';
        strategiesList.appendChild(empty);
        return;
      }

      items.forEach((item) => strategiesList.appendChild(renderStrategyCard(item)));
    };

    const renderTop5 = () => {
      const scored = [...allStrategies].map((item) => ({
        item,
        score: Number(item.min_investment) || 0
      }));

      scored.sort((a, b) => b.score - a.score);
      const top5 = scored.slice(0, 5).map((entry) => entry.item);

      topStrategiesList.innerHTML = '';
      if (!top5.length) {
        const empty = document.createElement('div');
        empty.className = 'text-sm text-slate-500';
        empty.textContent = 'No strategies available yet.';
        topStrategiesList.appendChild(empty);
      } else {
        top5.forEach((strategy, index) => {
          const row = document.createElement('div');
          row.className = 'border border-slate-200 rounded-2xl p-3 flex items-center justify-between gap-3';

          const name = strategy.short_name || strategy.name || 'Untitled strategy';
          const currency = strategy.base_currency || 'ZAR';
          const minInvestment = formatCurrency(strategy.min_investment, currency);

          row.innerHTML = `
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-7 h-7 rounded-full bg-slate-900 text-xs text-white flex items-center justify-center font-semibold">${index + 1}</div>
              <div class="min-w-0">
                <p class="text-sm font-medium text-slate-900 truncate">${name}</p>
                <p class="text-xs text-slate-500 truncate">Min investment: ${minInvestment}</p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              ${strategy.is_featured ? '<span class="px-2 py-0.5 text-[10px] rounded-full bg-amber-100 text-amber-700 font-semibold">Featured</span>' : ''}
              ${strategy.is_public ? '<span class="px-2 py-0.5 text-[10px] rounded-full bg-emerald-100 text-emerald-700 font-semibold">Public</span>' : ''}
            </div>
          `;

          topStrategiesList.appendChild(row);
        });
      }

      if (top5Badge) {
        top5Badge.textContent = `${top5.length} strategies`;
      }
    };

    const updateBadges = () => {
      const total = allStrategies.length;
      const publicCount = allStrategies.filter((s) => s.is_public).length;
      if (strategiesTotalBadge) strategiesTotalBadge.textContent = `${total} total`;
      if (strategiesPublicBadge) strategiesPublicBadge.textContent = `${publicCount} public`;
    };

    const loadStrategies = async () => {
      const { data, error } = await supabaseClient
        .from('strategies')
        .select('id, name, short_name, description, objective, risk_level, sector, min_investment, base_currency, is_featured, is_public, status, created_at')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Failed to load strategies', error);
        strategiesList.innerHTML = '<div class="text-sm text-slate-500">Could not load strategies.</div>';
        topStrategiesList.innerHTML = '<div class="text-sm text-slate-500">Could not load strategies.</div>';
        if (top5Badge) top5Badge.textContent = '0 strategies';
        return;
      }

      allStrategies = data || [];
      updateBadges();
      applyFiltersAndRender();
      renderTop5();
    };

    const showFormMessage = (text, type = 'info') => {
      if (!strategyFormMessage) return;
      strategyFormMessage.textContent = text || '';
      strategyFormMessage.className = 'text-xs ' + (type === 'error'
        ? 'text-rose-600'
        : type === 'success'
          ? 'text-emerald-600'
          : 'text-slate-500');
    };

    const handleStrategySubmit = async (event) => {
      event.preventDefault();
      if (!strategyForm) return;

      const formData = new FormData(strategyForm);
      const payload = {
        slug: '',
        name: (formData.get('name') || '').toString().trim() || null,
        short_name: (formData.get('short_name') || '').toString().trim() || null,
        description: (formData.get('description') || '').toString().trim() || null,
        objective: (formData.get('description') || '').toString().trim() || null,
        risk_level: (formData.get('risk_level') || '').toString().trim() || null,
        sector: (formData.get('sector') || '').toString().trim() || null,
        min_investment: formData.get('min_investment') ? Number(formData.get('min_investment')) : null,
        base_currency: (formData.get('base_currency') || '').toString().trim() || 'ZAR',
        is_public: strategyForm.querySelector('#strategyIsPublic')?.checked || false,
        is_featured: strategyForm.querySelector('#strategyIsFeatured')?.checked || false
      };

      if (!payload.name) {
        showFormMessage('Please provide at least a strategy name.', 'error');
        return;
      }

      payload.slug = createStrategySlug(payload.short_name || payload.name);

      showFormMessage('Saving strategy…', 'info');

      const submitButton = strategyForm.querySelector('button[type="submit"]');
      const originalText = submitButton ? submitButton.innerHTML : '';
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.innerHTML = '<span>Saving…</span>';
      }

      const { error } = await supabaseClient
        .from('strategies')
        .insert([payload]);

      if (submitButton) {
        submitButton.disabled = false;
        submitButton.innerHTML = originalText || '<span>Save strategy</span>';
      }

      if (error) {
        console.error('Failed to create strategy', error);
        showFormMessage('Could not save strategy. Please try again.', 'error');
        return;
      }

      strategyForm.reset();
      showFormMessage('Strategy saved successfully.', 'success');
      await loadStrategies();
    };

    const requireSession = async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = '/signin.html';
        return false;
      }
      return true;
    };

    if (signOutBtn) {
      signOutBtn.addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.href = '/signin.html';
      });
    }

    if (strategyForm) {
      strategyForm.addEventListener('submit', handleStrategySubmit);
    }

    if (strategySearch) {
      strategySearch.addEventListener('input', () => applyFiltersAndRender());
    }

    [filterRisk, filterVisibility, sortBy].forEach((el) => {
      if (el) {
        el.addEventListener('change', () => applyFiltersAndRender());
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      const ok = await requireSession();
      if (!ok) return;
      await loadStrategies();
    });
  </script>
</body>
</html>
